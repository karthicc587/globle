<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Globle Clone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>🌍 Globle Clone</h1>
  
  <div id="stats-display" class="stats-display"></div>
  <button id="reset-stats-btn" class="reset-stats-btn">Reset Progress</button>
  
  <div class="container">
    <div class="left-panel">
      <div class="input-wrapper">
        <input id="country-input" placeholder="Enter a country..." autocomplete="off" />
        <button id="guess-btn">Guess</button>
        <button id="give-up-btn" class="give-up-btn">Give Up</button>
        <div id="autocomplete-list"></div>
      </div>

      <div id="error-msg"></div>
      
      <div id="win-message">
        <div id="win-text"></div>
        <button id="share-btn">Copy Results 📋</button>
        <button id="play-again-btn">Play Again</button>
      </div>

      <h3>Guesses</h3>
      <div id="guess-list"></div>

      <div class="setting-item">
        <label>
          <input type="checkbox" id="compass-toggle" checked> Enable Compass Arrows
        </label>
        <label style="margin-top: 10px;">
          <input type="checkbox" id="tooltip-toggle" checked> Enable Hover Names
        </label>
      </div>
    </div>

    <div id="map-wrapper">
      <svg id="map"></svg>
      <div id="tooltip"></div>
    </div>
  </div>

  <script src="countries.js"></script>
  <script src="game.js"></script>
</body>
</html>
