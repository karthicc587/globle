<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Globle by Kartik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>🌍 Globle</h1>
  
  <div id="stats-display" class="stats-display">
    <button id="reset-stats-btn" class="reset-stats-btn">Reset Progress</button>
  </div>
  
  <div class="container">
    <div class="left-panel">
      <div class="input-wrapper">
        <input id="country-input" placeholder="Enter a country..." autocomplete="off" />
        <button id="guess-btn">Guess</button>
        <button id="give-up-btn" class="give-up-btn">Give Up</button>
        <div id="autocomplete-list"></div>
      </div>

      <div id="error-msg"></div>

      <div id="multiplayer-panel" class="multiplayer-panel" style="display:none;">
        <h3>Multiplayer Lobby</h3>
        <div class="mp-row">
          <input id="mp-display-name" placeholder="Display name" maxlength="24" />
        </div>
        <div class="mp-row">
          <button id="mp-create-room-btn">Create Room</button>
          <input id="mp-room-code-input" placeholder="Room code" maxlength="10" />
          <button id="mp-join-room-btn">Join</button>
        </div>
        <div class="mp-row">
          <button id="mp-ready-btn" disabled>Ready</button>
          <button id="mp-leave-btn" class="mp-secondary" disabled>Leave</button>
        </div>
        <div id="mp-status" class="mp-status">Create or join a room to start.</div>
        <div id="mp-room-meta" class="mp-room-meta"></div>
      </div>
      
      <div id="win-message" style="display: none;">
        <div id="win-text"></div>
        <button id="mp-rematch-btn" style="display:none; background: #8b5cf6;">Rematch ⚡</button>
        <button id="share-btn">Copy Results 📋</button>
        <button id="play-again-btn">Play Again</button>
      </div>

      <h3 id="guess-section-title">Guesses</h3>
      <div id="guess-list"></div>

      <div class="setting-item">
        <label>
          <span>Enable Compass Arrows 🧭</span>
          <input type="checkbox" id="compass-toggle" checked>
        </label>
        <label>
          <span>Enable Hover Names 🖱️</span>
          <input type="checkbox" id="tooltip-toggle" checked>
        </label>
        <label>
          <span>Enable Country Borders 🗺️</span>
          <input type="checkbox" id="borders-toggle" checked>
        </label>
        <label>
          <span>Multiplayer Mode 👥</span>
          <input type="checkbox" id="multiplayer-toggle">
        </label>
      </div>
      
      <div id="mode-links" style="margin-top: 20px; text-align: center;">
        <div class="mode-toggle-container">
          <a href="?mode=globle" id="link-globle" class="mode-link">Classic Mode</a>
          <a href="?mode=path" id="link-path" class="mode-link">Path Mode</a>
        </div>
      </div>
    </div> <div id="map-wrapper">
      <svg id="map"></svg>
      <div id="tooltip"></div>
    </div>
  </div> <script src="countries.js"></script>
  <script src="neighbors.js"></script>
  <script src="map.js"></script>
  <script src="globle-mode.js"></script>
  <script src="path-mode.js"></script>

</body>
